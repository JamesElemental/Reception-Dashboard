name: PowerBI Screenshot

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */2 * * *"   # Every 2 hours (UTC)
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          set -e
          npm init -y
          npm install -D playwright
          npx playwright install --with-deps chromium

      - name: Screenshot loop
        run: |
          set -e
          mkdir -p screenshots

          # Write Node script once
          cat > script.js <<'JS'
          const { chromium } = require('playwright');

          (async () => {
            const t = process.env.TS;

            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--lang=en-GB']
            });

            const context = await browser.newContext({
              viewport: { width: 1920, height: 1080 },
              locale: 'en-GB',
              timezoneId: 'Europe/London'
            });

            const page = await context.newPage();

            await page.goto(
              'https://app.powerbi.com/view?r=eyJrIjoiY2E0NzNjOTktYzkxZC00N2NhLWJlY2YtMDgwNTFmZjUyOGNjIiwidCI6ImYxZDhiY2I0LTdlYTgtNDcxNC1iYmYzLTlhMzg5NzY0ZjM1MCJ9',
              { waitUntil: 'domcontentloaded' }
            );

            // Allow Power BI visuals to render
            await page.waitForTimeout(40000);

            await page.screenshot({
              path: `screenshots/dashboard-${t}.png`
            });

            await browser.close();
          })().catch(e => {
            console.error(e);
            process.exit(1);
          });
          JS

          # Take 8 screenshots, 15 minutes apart (2 hours total)
          for i in 1 2 3 4 5 6 7 8; do
            TS=$(date -u +"%d-%m-%Y_%H-%M")
            echo "📸 Screenshot $i at $TS"

            TS="$TS" node script.js

            cp "screenshots/dashboard-$TS.png" "screenshots/dashboard-latest.png"
            echo "dashboard-$TS.png" > screenshots/latest.txt

            if [ "$i" -lt 8 ]; then
              sleep 900
            fi
          done

      - name: Commit output
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A screenshots
          git commit -m "Update screenshots" || echo "No changes"
          git push "https://x-access-token:${TOKEN}@github.com/JamesElemental/Reception-Dashboard.git"
